name: 编译红米 CR8808 专属固件 (自动发布版)

on:
  workflow_dispatch: # 允许在网页上手动点击运行

# 必须赋予 GitHub Actions 创建 Release 的权限！
permissions:
  contents: write

env:
  REPO_URL: https://github.com/kmiit/Redmi_AX3000_immortalwrt.git
  REPO_BRANCH: master
  CONFIG_FILE: .config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@v3

    - name: 初始化编译环境 (清理空间 & 安装依赖)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
    - name: Install CMake 3.31+
      run: |
        wget https://github.com/Kitware/CMake/releases/download/v3.31.0/cmake-3.31.0-linux-x86_64.tar.gz
        tar xzf cmake-3.31.0-linux-x86_64.tar.gz
        sudo cp -r cmake-3.31.0-linux-x86_64/* /usr/local/
        cmake --version
    
    - name: 克隆基础源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 注入自定义插件源 (iStore & 最新 PassWall)
      working-directory: /workdir/openwrt
      run: |
        # 清理自带旧版 passwall
        rm -rf package/lean/luci-app-passwall
        # 注入 iStore 官方仓库
        echo "src-git istore https://github.com/linkease/istore;main" >> feeds.conf.default
        # 注入最新版 PassWall 官方仓库
        echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main" >> feeds.conf.default
        echo "src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main" >> feeds.conf.default

    - name: 更新 & 安装插件源 (Feeds)
      working-directory: /workdir/openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 导入你的专属 .config 配置文件
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    - name: 下载依赖包 (Download dl)
      working-directory: /workdir/openwrt
      run: |
        make download -j8 || make download -j1 V=s
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 开始全速编译固件
      id: compile
      working-directory: /workdir/openwrt
      run: |
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s || make -j$(nproc)
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理编译好的固件
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 生成发布标签 (Release Tag)
      id: tag
      if: steps.organize.outputs.status == 'success'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "release_name=CR8808 专属固件 $(date +"%Y.%m.%d")" >> $GITHUB_OUTPUT

    - name: 发布至 GitHub Releases
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success'
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: ${{ steps.tag.outputs.release_name }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          ## 🚀 CR8808 / AX3000 自动编译固件
          
          **💻 核心信息:**
          * 源码来源: ImmortalWrt (kmiit 专属分支)
          * 适用机型: 小米/红米 CR8808, AX3000 等 IPQ5018 芯片机型
          
          **📦 包含核心插件:**
          * `luci-app-passwall` (强行注入最新版)
          * `luci-app-store` (iStore 应用市场)
          
          *🔔 提示：请下载带有 `sysupgrade.bin` 字样的文件在路由器后台进行升级刷入。*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
